<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Detection</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252542;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        .panel h2 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        input[type="file"] {
            padding: 0.5rem;
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button {
            display: none;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .upload-area .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 1rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            background: var(--bg-secondary);
            padding: 0 0.75rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            position: relative;
        }

        .image-container {
            position: relative;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }

        .detection-box {
            position: absolute;
            border: 3px solid;
            border-radius: 4px;
            pointer-events: none;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
        }

        /* Colors for different detection ranks */
        .detection-box.rank-0 { border-color: #22c55e; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(34, 197, 94, 0.4); }
        .detection-box.rank-0 .detection-label { background: #22c55e; }

        .detection-box.rank-1 { border-color: #3b82f6; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(59, 130, 246, 0.4); }
        .detection-box.rank-1 .detection-label { background: #3b82f6; }

        .detection-box.rank-2 { border-color: #f59e0b; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(245, 158, 11, 0.4); }
        .detection-box.rank-2 .detection-label { background: #f59e0b; }

        .detection-box.rank-3 { border-color: #ec4899; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(236, 72, 153, 0.4); }
        .detection-box.rank-3 .detection-label { background: #ec4899; }

        .detection-box.rank-4 { border-color: #8b5cf6; box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.4); }
        .detection-box.rank-4 .detection-label { background: #8b5cf6; }

        .detection-label {
            position: absolute;
            top: -28px;
            left: 0;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .detection-score {
            position: absolute;
            bottom: -24px;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .placeholder {
            color: var(--text-secondary);
            text-align: center;
            padding: 3rem;
        }

        .placeholder .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .result-info {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 0.875rem;
        }

        .result-info.success {
            border-left: 3px solid var(--success);
        }

        .result-info.error {
            border-left: 3px solid var(--error);
        }

        .result-info p {
            margin: 0.25rem 0;
            color: var(--text-secondary);
        }

        .result-info strong {
            color: var(--text-primary);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-thumb {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 0.5rem;
            display: none;
        }

        .preview-thumb.active {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>Logo Detection</h1>
    </header>

    <main>
        <aside class="panel">
            <h2>Upload Image</h2>

            <div class="form-group">
                <label for="userId">User ID</label>
                <input type="text" id="userId" value="user-1" placeholder="Enter user ID">
            </div>

            <div class="form-group">
                <div class="upload-area" id="uploadArea">
                    <div class="icon">📁</div>
                    <p>Drop image here or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <img id="preview" class="preview-thumb" alt="Preview">
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.png">
            </div>

            <button id="detectBtn" disabled>Detect Logo</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Detecting logo...</p>
            </div>
        </aside>

        <section class="panel">
            <h2>Detection Result</h2>
            <div class="image-container" id="resultContainer">
                <div class="placeholder">
                    <div class="icon">🔍</div>
                    <p>Upload an image and click "Detect Logo" to see results</p>
                </div>
            </div>
            <div id="resultInfo"></div>
        </section>
    </main>

    <script>
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageUrl = document.getElementById('imageUrl');
        const userId = document.getElementById('userId');
        const detectBtn = document.getElementById('detectBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultInfo = document.getElementById('resultInfo');
        const loading = document.getElementById('loading');
        const preview = document.getElementById('preview');

        let currentFile = null;
        let currentImageUrl = null;

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        imageUrl.addEventListener('input', () => {
            currentImageUrl = imageUrl.value.trim();
            currentFile = null;
            preview.classList.remove('active');
            updateButtonState();
        });

        detectBtn.addEventListener('click', detectLogo);

        // Functions
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please upload a valid image file');
                return;
            }

            currentFile = file;
            currentImageUrl = null;
            imageUrl.value = '';

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.add('active');
            };
            reader.readAsDataURL(file);

            updateButtonState();
        }

        function updateButtonState() {
            detectBtn.disabled = !currentFile && !currentImageUrl;
        }

        async function detectLogo() {
            loading.classList.add('active');
            detectBtn.disabled = true;
            resultInfo.innerHTML = '';

            try {
                let imageSrc;
                let response;

                if (currentFile) {
                    // Use file upload endpoint
                    const formData = new FormData();
                    formData.append('file', currentFile);
                    formData.append('user_id', userId.value || 'user-1');

                    imageSrc = preview.src;

                    response = await fetch('/api/v1/products/detect-logo-file', {
                        method: 'POST',
                        body: formData
                    });
                } else if (currentImageUrl) {
                    // Use URL-based endpoint
                    imageSrc = currentImageUrl;

                    response = await fetch('/api/v1/products/detect-logo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            user_id: userId.value || 'user-1',
                            image_url: currentImageUrl
                        })
                    });
                } else {
                    throw new Error('No image provided');
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Detection failed');
                }

                const result = await response.json();
                displayResult(imageSrc, result);
            } catch (error) {
                showError(error.message);
            } finally {
                loading.classList.remove('active');
                updateButtonState();
            }
        }

        function displayResult(imageSrc, result) {
            // Clear container
            resultContainer.innerHTML = '';

            // Create image
            const img = document.createElement('img');
            img.src = imageSrc;
            img.id = 'resultImage';
            resultContainer.appendChild(img);

            // Wait for image to load before drawing boxes
            img.onload = () => {
                const detections = result.detections || [];
                if (result.found && detections.length > 0) {
                    detections.forEach((detection, index) => {
                        drawDetectionBox(detection, img, index);
                    });
                    showResultInfo(result, true);
                } else {
                    showResultInfo(result, false);
                }
            };
        }

        function drawDetectionBox(detection, img, rank) {
            const container = resultContainer;
            const containerRect = container.getBoundingClientRect();
            const imgRect = img.getBoundingClientRect();

            // Calculate scaling factors
            const scaleX = imgRect.width / img.naturalWidth;
            const scaleY = imgRect.height / img.naturalHeight;

            // Create detection box with rank-based color
            const box = document.createElement('div');
            box.className = `detection-box rank-${Math.min(rank, 4)}`;

            // Calculate position relative to the image
            const x = (detection.x_min * scaleX) + (imgRect.left - containerRect.left);
            const y = (detection.y_min * scaleY) + (imgRect.top - containerRect.top);
            const width = (detection.x_max - detection.x_min) * scaleX;
            const height = (detection.y_max - detection.y_min) * scaleY;

            box.style.left = `${x}px`;
            box.style.top = `${y}px`;
            box.style.width = `${width}px`;
            box.style.height = `${height}px`;

            // Add label with rank
            const label = document.createElement('div');
            label.className = 'detection-label';
            const rankLabel = rank === 0 ? 'Best' : `#${rank + 1}`;
            label.textContent = `${rankLabel}: ${detection.label || 'brand logo'}`;
            box.appendChild(label);

            // Add score
            const score = document.createElement('div');
            score.className = 'detection-score';
            score.textContent = `Score: ${(detection.score * 100).toFixed(1)}%`;
            box.appendChild(score);

            container.appendChild(box);
        }

        function showResultInfo(result, found) {
            const div = document.createElement('div');
            div.className = `result-info ${found ? 'success' : 'error'}`;

            if (found) {
                const detections = result.detections || [];
                let html = `<p><strong>Status:</strong> ${detections.length} logo(s) detected</p>`;
                html += `<p><strong>Job ID:</strong> ${result.job_id}</p>`;
                html += `<p><strong>Product ID:</strong> ${result.product_id}</p>`;
                html += '<hr style="border-color: var(--border); margin: 0.75rem 0;">';

                detections.forEach((d, i) => {
                    const rankLabel = i === 0 ? 'Best' : `#${i + 1}`;
                    html += `
                        <p><strong>${rankLabel}:</strong> ${d.label || 'brand logo'} (${(d.score * 100).toFixed(1)}%)</p>
                        <p style="padding-left: 1rem; color: var(--text-secondary);">
                            Box: (${Math.round(d.x_min)}, ${Math.round(d.y_min)}) - (${Math.round(d.x_max)}, ${Math.round(d.y_max)})
                        </p>
                    `;
                });

                div.innerHTML = html;
            } else {
                div.innerHTML = `
                    <p><strong>Status:</strong> No logo detected</p>
                    <p><strong>Job ID:</strong> ${result.job_id}</p>
                    <p><strong>Product ID:</strong> ${result.product_id}</p>
                `;
            }

            resultInfo.innerHTML = '';
            resultInfo.appendChild(div);
        }

        function showError(message) {
            const div = document.createElement('div');
            div.className = 'result-info error';
            div.innerHTML = `<p><strong>Error:</strong> ${message}</p>`;
            resultInfo.innerHTML = '';
            resultInfo.appendChild(div);
        }
    </script>
</body>
</html>
